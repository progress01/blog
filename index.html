<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blog Template Builder</title>
    
    <!-- Firebase Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --bg-main: #191414; --bg-panel: #2c1e16; --text-main: #e0e0e0;
            --accent: #ffb74d; --btn-primary: #e65100; --btn-hover: #ff9800;
            --border-color: #5d4037;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; 
            background-color: var(--bg-main); color: var(--text-main); 
            margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column;
        }

        /* 登入畫面 */
        #login-screen { position: fixed; inset: 0; background: #191414; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .login-btn { background: var(--btn-primary); color: #fff; border: none; padding: 15px 30px; font-size: 1.1rem; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .login-btn:hover { background: var(--btn-hover); }

        /* 頂部導航 */
        header { background: #000; padding: 15px 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .brand { color: var(--accent); font-weight: bold; font-size: 1.2rem; margin: 0; }
        .header-actions { display: flex; gap: 10px; align-items: center; }

        /* 模板管理側邊欄 */
        .template-selector { padding: 15px 20px; background: #231812; display: flex; gap: 10px; overflow-x: auto; border-bottom: 1px solid var(--border-color); align-items: center; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .template-selector::-webkit-scrollbar { display: none; }
        .tpl-badge { background: transparent; border: 1px solid var(--border-color); color: #aaa; padding: 6px 12px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 0.9rem; transition: 0.2s; }
        .tpl-badge.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }

        /* 主佈局 */
        .container { display: flex; flex-direction: row; gap: 20px; padding: 20px; flex: 1; max-width: 1400px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .panel { flex: 1; background: var(--bg-panel); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); display: flex; flex-direction: column; }
        
        h2 { color: var(--accent); border-bottom: 1px dashed var(--border-color); padding-bottom: 10px; margin-top: 0; font-size: 1.2rem; display: flex; justify-content: space-between; align-items: center;}
        
        textarea { width: 100%; flex: 1; min-height: 250px; background: #000; color: #4ade80; border: 1px solid #333; padding: 15px; box-sizing: border-box; font-family: monospace; font-size: 15px; line-height: 1.6; border-radius: 8px; resize: vertical; margin-bottom: 15px; outline: none; }
        textarea:focus { border-color: var(--accent); }
        
        button { background: var(--btn-primary); color: #fff; border: none; padding: 10px 15px; cursor: pointer; font-weight: bold; border-radius: 8px; font-size: 0.95rem; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
        button:hover { background: var(--btn-hover); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .highlight-btn { background: #16a34a; width: 100%; margin-bottom: 15px; }
        .highlight-btn:hover { background: #15803d; }
        
        /* 🔥 草稿櫃 UI */
        .draft-manager { display: flex; gap: 10px; margin-bottom: 15px; background: #1c1917; padding: 10px; border-radius: 8px; border: 1px solid #444; }
        .draft-manager select { flex: 1; padding: 8px; background: #000; color: var(--accent); border: 1px solid var(--border-color); border-radius: 6px; font-weight: bold; outline: none; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; color: #ffcc80; margin-bottom: 8px; font-weight: bold; font-size: 0.9rem; }
        .input-wrapper { display: flex; flex-direction: column; gap: 5px; }
        input[type="text"], textarea.draft-input { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border-color); color: #fff; box-sizing: border-box; border-radius: 6px; font-size: 1rem; outline: none; font-family: monospace; }
        input[type="text"]:focus, textarea.draft-input:focus { border-color: var(--accent); }
        textarea.draft-input { min-height: 80px; resize: vertical; }

        #dynamic-fields-container { background: #3e2723; padding: 20px; border-radius: 8px; margin-bottom: 15px; border: 1px dashed #ffa726; flex-shrink: 0; max-height: 50vh; overflow-y: auto; }
        
        .action-row { display: flex; gap: 10px; margin-top: auto; }
        .action-row button { flex: 1; }

        .status-text { font-size: 0.8rem; color: #9ca3af; font-weight: normal; }

        @media (max-width: 768px) {
            .container { flex-direction: column; padding: 15px; gap: 15px; }
            .panel { padding: 15px; }
            textarea { min-height: 200px; font-size: 14px; }
            header { flex-wrap: wrap; gap: 10px; }
            .draft-manager { flex-direction: column; }
        }
    </style>
</head>
<body>

<div id="login-screen">
    <h1 style="color: #ffb74d; margin-bottom: 10px;">Blog Content Builder</h1>
    <p style="color: #aaa; margin-bottom: 30px;">多檔草稿・防呆備份・一鍵產出</p>
    <button class="login-btn" onclick="loginFirebase()">使用 Google 登入</button>
</div>

<div id="app-content" style="display: none; flex-direction: column; min-height: 100vh;">
    <header>
        <h1 class="brand">📝 Content Builder</h1>
        <div class="header-actions">
            <button onclick="saveToCloud()" id="btn-cloud-save" style="background: #059669; padding: 6px 12px; font-size: 0.85rem;">☁️ 雲端備份(含草稿)</button>
            <button onclick="loadFromCloud()" id="btn-cloud-load" style="background: #d97706; padding: 6px 12px; font-size: 0.85rem;">📥 還原</button>
            <button onclick="clearAllLocalData()" style="background: #7f1d1d; border: 1px solid #ef4444; padding: 6px 12px; font-size: 0.85rem;">🗑️ 清空本機</button>
            <button onclick="logoutFirebase()" style="background: transparent; border: 1px solid #ef4444; color: #ef4444; padding: 6px 12px; font-size: 0.85rem;">登出</button>
        </div>
    </header>

    <div class="template-selector">
        <button onclick="createNewTemplate()" style="background: #475569; padding: 6px 12px; border-radius: 20px; font-size: 0.9rem;">＋ 新增模板</button>
        <div style="width: 1px; height: 20px; background: var(--border-color); margin: 0 5px;"></div>
        <div id="tpl-list" style="display: flex; gap: 10px;"></div>
    </div>

    <div class="container">
        <!-- 左側：模板創造區 -->
        <div class="panel">
            <h2>
                <span>🛠️ 模板結構 (骨架)</span>
                <span id="tpl-save-status" class="status-text">已儲存本機</span>
            </h2>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <input type="text" id="tpl-name" placeholder="模板名稱 (例如: 技術教學)" style="flex: 1; margin: 0;" oninput="saveLocal()">
                <button onclick="deleteCurrentTemplate()" style="background: transparent; color: #ef4444; border: 1px solid #ef4444;">🗑️ 刪除</button>
            </div>
            
            <button class="highlight-btn" onclick="makePlaceholder()">✨ 將反白處轉為「動態欄位」</button>
            <textarea id="template-editor" placeholder="輸入格式，支援預設值如 {{author|Gemini}}" oninput="parseTemplate(); saveLocal();"></textarea>
        </div>

        <!-- 右側：文章產生器 -->
        <div class="panel">
            <h2>
                <span>📝 內容編輯 (草稿櫃)</span>
                <span id="draft-save-status" class="status-text">已暫存</span>
            </h2>
            
            <!-- 🔥 獨立草稿櫃管理器 -->
            <div class="draft-manager">
                <select id="draft-selector" onchange="switchDraft(this.value)"></select>
                <button onclick="deleteCurrentDraft()" style="background: transparent; color: #ef4444; border: 1px solid #ef4444;">🗑️ 刪除草稿</button>
            </div>

            <div id="dynamic-fields-container">
                <p style="margin:0; color:#aaa; text-align: center;">請在左側輸入包含 {{變數}} 的格式</p>
            </div>

            <label>預覽結果</label>
            <textarea id="output-preview" readonly style="color: #fff; background: #1c1917; border-color: #334155; min-height: 150px;"></textarea>
            
            <div class="action-row">
                <button onclick="copyOutput()" style="background: #4b5563;">📋 複製內容</button>
                <button onclick="downloadMarkdown()" style="background: #2563eb; flex: 2;">📥 下載 .md 檔</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // 輔助函式：取得正確的本地日期字串 (YYYY-MM-DD)
    // ==========================================
    function getLocalDateString() {
        const d = new Date();
        return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    // ==========================================
    // 1. Firebase 初始化
    // ==========================================
    const firebaseConfig = {
        apiKey: "AIzaSyAIY9PU-bDLktkTpLSmFKRe1uepvWCKEiU",
        authDomain: "maplestoryboss.firebaseapp.com",
        projectId: "maplestoryboss",
        storageBucket: "maplestoryboss.firebasestorage.app",
        messagingSenderId: "198034430854",
        appId: "1:198034430854:web:527ffcee039e223b972a07"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    let currentUser = null;
    let templates = [];
    let drafts = []; // 🔥 所有草稿的總陣列
    let currentTplId = null;
    
    // 🔥 草稿狀態追蹤
    let currentDraft = { id: null, values: {} }; 
    let isDraftPersistent = false; // 判定草稿是否已正式推入 drafts 陣列
    
    let lastSyncTime = 0; // 🔥 用於防護雲端覆蓋的時間戳

    auth.onAuthStateChanged(user => {
        if (user) {
            currentUser = user;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'flex';
            initLocalData();
        } else {
            currentUser = null;
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('app-content').style.display = 'none';
        }
    });

    function loginFirebase() { auth.signInWithPopup(provider); }
    function logoutFirebase() { auth.signOut(); }

    // ==========================================
    // 2. 本機資料管理與一鍵清空
    // ==========================================
    function initLocalData() {
        const tplKey = `blogbuilder_tpls_${currentUser.uid}`;
        const draftKey = `blogbuilder_drafts_${currentUser.uid}`;
        const syncKey = `blogbuilder_sync_${currentUser.uid}`;
        
        try { templates = JSON.parse(localStorage.getItem(tplKey)) || []; } catch(e) { templates = []; }
        try { drafts = JSON.parse(localStorage.getItem(draftKey)) || []; } catch(e) { drafts = []; }
        lastSyncTime = parseInt(localStorage.getItem(syncKey)) || 0;

        // 舊版草稿遷移(防護)
        if (!Array.isArray(drafts)) drafts = [];

        if (templates.length === 0) {
            createNewTemplate();
        } else {
            loadTemplate(templates[0].id);
        }
    }

    function saveLocal() {
        if (!currentTplId) return;
        
        const tpl = templates.find(t => t.id === currentTplId);
        if (tpl) {
            tpl.name = document.getElementById('tpl-name').value || '未命名模板';
            tpl.content = document.getElementById('template-editor').value;
        }

        localStorage.setItem(`blogbuilder_tpls_${currentUser.uid}`, JSON.stringify(templates));
        localStorage.setItem(`blogbuilder_drafts_${currentUser.uid}`, JSON.stringify(drafts));
        
        renderTemplateList();
        
        const status = document.getElementById('tpl-save-status');
        status.innerText = '✅ 已儲存本機'; status.style.color = '#4ade80';
        setTimeout(() => { status.innerText = '已儲存本機'; status.style.color = '#9ca3af'; }, 1500);
    }

    function clearAllLocalData() {
        if (!confirm('⚠️ 警告：這將清除本機所有「模板」與「未完成的草稿」。\n若未備份至雲端，資料將永久遺失。確定清空？')) return;
        
        const keysToRemove = [];
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key.startsWith('blogbuilder_tpls_') || key.startsWith('blogbuilder_drafts_') || key.startsWith('blogbuilder_sync_') || key.startsWith('draft_')) {
                keysToRemove.push(key);
            }
        }
        keysToRemove.forEach(k => localStorage.removeItem(k));

        templates = []; drafts = []; lastSyncTime = 0;
        createNewTemplate();
        alert('🗑️ 本機資料已全部清空，恢復為全新狀態！');
    }

    // ==========================================
    // 3. 🛡️ 雲端同步 (包含時間戳防禦機制與草稿備份)
    // ==========================================
    async function saveToCloud() {
        const btn = document.getElementById('btn-cloud-save');
        const origText = btn.innerText;
        btn.innerText = '☁️ 檢查中...';
        btn.disabled = true;

        try {
            // 🔥 防禦機制：先檢查雲端版本
            const doc = await db.collection("Dynamic_Templates").doc(currentUser.uid).get();
            if (doc.exists && doc.data().updatedAt) {
                const cloudTime = doc.data().updatedAt.toMillis();
                if (cloudTime > lastSyncTime) {
                    if(!confirm("⚠️ 警告：雲端有較新的資料版本！\n\n如果你強制上傳，將會覆蓋其他裝置(例如公司電腦)的最新修改。\n按「確定」強制覆蓋雲端，按「取消」中斷上傳。")) {
                        return; // 使用者取消
                    }
                }
            }

            btn.innerText = '☁️ 上傳中...';
            // 🔥 重大修正：將 drafts 一併打包上傳
            const payload = { 
                templates: templates, 
                drafts: drafts, 
                updatedAt: firebase.firestore.FieldValue.serverTimestamp() 
            };
            await db.collection("Dynamic_Templates").doc(currentUser.uid).set(payload);
            
            lastSyncTime = Date.now();
            localStorage.setItem(`blogbuilder_sync_${currentUser.uid}`, lastSyncTime.toString());
            alert('✅ 模板與草稿已整包備份至 Firebase！');
            
        } catch (e) { alert('上傳失敗：' + e.message); } 
        finally { btn.innerText = origText; btn.disabled = false; }
    }

    async function loadFromCloud() {
        if (!confirm('⚠️ 這將會用雲端資料覆蓋本機目前的「模板」與「草稿」。確定還原？')) return;
        
        const btn = document.getElementById('btn-cloud-load');
        const origText = btn.innerText; btn.innerText = '📥 下載中...'; btn.disabled = true;

        try {
            const doc = await db.collection("Dynamic_Templates").doc(currentUser.uid).get();
            if (doc.exists) {
                templates = doc.data().templates || [];
                drafts = doc.data().drafts || []; // 🔥 重大修正：一併還原草稿
                
                // 更新同步時間
                if (doc.data().updatedAt) {
                    lastSyncTime = doc.data().updatedAt.toMillis();
                    localStorage.setItem(`blogbuilder_sync_${currentUser.uid}`, lastSyncTime.toString());
                }

                saveLocal();
                if(templates.length > 0) loadTemplate(templates[0].id); else createNewTemplate();
                alert('📥 雲端資料 (包含草稿) 還原成功！');
            } else { alert('雲端目前沒有您的備份資料。'); }
        } catch (e) { alert('下載失敗：' + e.message); } 
        finally { btn.innerText = origText; btn.disabled = false; }
    }

    // ==========================================
    // 4. UI 與模板切換
    // ==========================================
    function renderTemplateList() {
        const list = document.getElementById('tpl-list'); list.innerHTML = '';
        templates.forEach(tpl => {
            const btn = document.createElement('button');
            btn.className = `tpl-badge ${tpl.id === currentTplId ? 'active' : ''}`;
            btn.innerText = tpl.name || '未命名';
            btn.onclick = () => loadTemplate(tpl.id);
            list.appendChild(btn);
        });
    }

    function createNewTemplate() {
        const newId = Date.now().toString();
        const defaultContent = `---\ntitle: {{title|我的新文章}}\ndate: {{date}}\nlayout: {{layout|post}}\ntags: [{{tags}}]\n---\n\n## 導言\n{{intro}}\n\n## 正文\n{{content}}`;
        templates.unshift({ id: newId, name: '新模板', content: defaultContent });
        loadTemplate(newId);
    }

    function loadTemplate(id) {
        currentTplId = id;
        const tpl = templates.find(t => t.id === id);
        if (!tpl) return;
        
        document.getElementById('tpl-name').value = tpl.name;
        document.getElementById('template-editor').value = tpl.content;
        
        renderTemplateList();
        renderDraftSelector(); // 🔥 重新渲染這份模板專屬的草稿選單
    }

    function deleteCurrentTemplate() {
        if(templates.length <= 1) return alert('最少必須保留一個模板！\n若要全部重置，請使用「清空本機」功能。');
        if (confirm('確定要刪除這份模板嗎？這會連帶刪除所有使用此模板的草稿！')) {
            templates = templates.filter(t => t.id !== currentTplId);
            drafts = drafts.filter(d => d.tplId !== currentTplId); // 連帶清草稿
            saveLocal();
            loadTemplate(templates[0].id);
        }
    }

    // ==========================================
    // 5. 🔥 草稿櫃機制 (Draft Manager)
    // ==========================================
    function renderDraftSelector() {
        const select = document.getElementById('draft-selector');
        select.innerHTML = '<option value="new">🆕 建立全新草稿</option>';
        
        // 找出屬於這個模板的草稿
        const tplDrafts = drafts.filter(d => d.tplId === currentTplId).sort((a,b) => b.updatedAt - a.updatedAt);
        
        tplDrafts.forEach(d => {
            const opt = document.createElement('option');
            opt.value = d.id;
            const dateStr = new Date(d.updatedAt).toLocaleString('zh-TW', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
            // 使用草稿內的 title，如果沒有就顯示時間
            const displayTitle = d.values['title'] || `未命名草稿 (${dateStr})`;
            opt.text = `📝 ${displayTitle}`;
            select.appendChild(opt);
        });

        // 預設載入最新的草稿，或建立新的
        if (tplDrafts.length > 0) {
            select.value = tplDrafts[0].id;
            switchDraft(tplDrafts[0].id);
        } else {
            select.value = 'new';
            switchDraft('new');
        }
    }

    function switchDraft(draftId) {
        if (draftId === 'new') {
            currentDraft = { id: Date.now().toString(), tplId: currentTplId, values: {}, updatedAt: Date.now() };
            isDraftPersistent = false; // 還沒打字，先不推進總陣列
        } else {
            const found = drafts.find(d => d.id === draftId);
            if (found) {
                currentDraft = found;
                isDraftPersistent = true;
            }
        }
        parseTemplate();
    }

    function updateDraftField(field, value) {
        currentDraft.values[field] = value;
        currentDraft.updatedAt = Date.now();
        
        // 如果是新草稿第一次打字，正式把它推入總陣列
        if (!isDraftPersistent) {
            drafts.push(currentDraft);
            isDraftPersistent = true;
        }

        saveLocal();
        
        // 如果修改的是 title 欄位，同步更新選單名稱
        if (field === 'title') {
            const select = document.getElementById('draft-selector');
            const opt = Array.from(select.options).find(o => o.value === currentDraft.id);
            if(opt) opt.text = `📝 ${value || '未命名草稿'}`;
        }

        const status = document.getElementById('draft-save-status');
        status.innerText = '✏️ 草稿已暫存'; status.style.color = '#38bdf8';
        setTimeout(() => { status.innerText = '草稿已暫存'; status.style.color = '#9ca3af'; }, 1500);

        renderOutput();
    }

    function deleteCurrentDraft() {
        if (!isDraftPersistent) return alert('這是一份尚未開始輸入的空白草稿。');
        if (confirm('確定要刪除目前的草稿嗎？')) {
            drafts = drafts.filter(d => d.id !== currentDraft.id);
            saveLocal();
            // 刪除後強制回到「建立新草稿」狀態，避免畫面殘留
            document.getElementById('draft-selector').value = 'new';
            switchDraft('new'); 
            renderDraftSelector(); 
        }
    }

    // ==========================================
    // 6. 核心文字處理與 ⚡ 智慧預設值解析
    // ==========================================
    function makePlaceholder() {
        const editor = document.getElementById('template-editor');
        const start = editor.selectionStart; const end = editor.selectionEnd;
        if (start === end) return alert('⚠️ 請先用滑鼠「反白」文字！');

        const input = prompt('請輸入英文變數，支援預設值 (例如: title 或 author|Gemini):');
        if (!input) return; 

        const text = editor.value;
        const newText = text.substring(0, start) + `{{${input}}}` + text.substring(end);
        
        editor.value = newText;
        parseTemplate(); saveLocal();
    }

    function parseTemplate() {
        const templateText = document.getElementById('template-editor').value;
        const container = document.getElementById('dynamic-fields-container');
        
        const regex = /{{([^}]+)}}/g;
        let match;
        const fieldMap = new Map(); 
        
        while ((match = regex.exec(templateText)) !== null) {
            // 🔥 解析預設值：{{變數名|預設值}}
            const parts = match[1].split('|');
            const name = parts[0].trim();
            const defaultVal = parts[1] ? parts[1].trim() : '';
            if (!fieldMap.has(name)) {
                fieldMap.set(name, { name: name, defaultVal: defaultVal });
            }
        }

        if (fieldMap.size === 0) {
            container.innerHTML = '<p style="margin:0; color:#aaa; text-align:center;">尚無動態欄位</p>';
            renderOutput(); return;
        }

        let html = '';
        fieldMap.forEach(meta => {
            const isLongText = meta.name.toLowerCase().includes('content') || meta.name.toLowerCase().includes('body') || meta.name.toLowerCase().includes('intro');
            
            // 🔥 取出存檔值，如果沒有存檔值，才顯示預設值
            let displayValue = currentDraft.values[meta.name];
            if (displayValue === undefined) displayValue = meta.defaultVal;
            
            // 處理引號跳脫避免 HTML 壞掉
            const safeValue = displayValue.replace(/"/g, '&quot;');

            html += `
                <div class="form-group">
                    <label>${meta.name.toUpperCase()} <span style="color:#64748b; font-weight:normal; font-size:12px;">${meta.defaultVal ? `(預設: ${meta.defaultVal})` : ''}</span></label>
                    <div class="input-wrapper">
                        ${isLongText 
                            ? `<textarea id="input-${meta.name}" class="draft-input" oninput="updateDraftField('${meta.name}', this.value)" placeholder="支援多行 Markdown...">${displayValue}</textarea>`
                            : `<input type="text" id="input-${meta.name}" oninput="updateDraftField('${meta.name}', this.value)" placeholder="輸入 ${meta.name}..." value="${safeValue}">`
                        }
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
        
        // 特殊處理：如果有 date 欄位且為空，自動帶入今天日期 (使用修正後的在地時間)
        const dateInput = document.getElementById('input-date');
        if (dateInput && !dateInput.value) {
            const today = getLocalDateString();
            dateInput.value = today;
            updateDraftField('date', today);
        }

        renderOutput();
    }

    function renderOutput() {
        let resultText = document.getElementById('template-editor').value;
        const inputs = document.querySelectorAll('#dynamic-fields-container input, #dynamic-fields-container textarea');
        
        inputs.forEach(input => {
            const fieldName = input.id.replace('input-', '');
            const value = input.value || ''; 
            
            // 🔥 正則替換：同時兼容 {{name}} 與 {{name|default}} 兩種寫法
            const escapeRegExp = (string) => string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const replaceRegex = new RegExp(`{{\\s*${escapeRegExp(fieldName)}\\s*(?:\\|[^}]*)?}}`, 'g');
            
            resultText = resultText.replace(replaceRegex, value);
        });

        document.getElementById('output-preview').value = resultText;
    }

    // ==========================================
    // 7. 匯出與下載
    // ==========================================
    function copyOutput() {
        const output = document.getElementById('output-preview');
        output.select(); document.execCommand('copy');
        const btn = event.target; const origText = btn.innerText;
        btn.innerText = '✅ 已複製！'; btn.style.background = '#059669';
        setTimeout(() => { btn.innerText = origText; btn.style.background = '#4b5563'; }, 2000);
    }

    function downloadMarkdown() {
        const text = document.getElementById('output-preview').value;
        if (!text.trim()) return alert('內容為空，無法下載。');

        const dateInput = document.getElementById('input-date');
        const titleInput = document.getElementById('input-title');
        
        // 檔名日期也改用正確的本地日期
        const datePart = (dateInput && dateInput.value) ? dateInput.value : getLocalDateString();
        let titlePart = (titleInput && titleInput.value) ? titleInput.value : 'draft';
        titlePart = titlePart.replace(/[\\/:*?"<>| ]/g, '-');

        const filename = `${datePart}-${titlePart}.md`;

        const blob = new Blob([text], { type: "text/markdown;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
        URL.revokeObjectURL(url);
    }
</script>

</body>
</html>
